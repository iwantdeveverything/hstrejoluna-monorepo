name: Setup Node.js and Dependencies
description: Node.js setup, pnpm install, and Next.js cache restore (requires checkout first)

inputs:
  node-version:
    description: Node.js version
    default: '22'
  nextjs-cache:
    description: Whether to restore Next.js cache
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.4.0
        run_install: false

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Next.js Cache
      if: inputs.nextjs-cache == 'true'
      uses: actions/cache@v4
      with:
        path: |
          ${{ github.workspace }}/apps/portfolio/.next/cache
          ${{ github.workspace }}/apps/maestros-del-salmon/.next/cache
        key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-nextjs-