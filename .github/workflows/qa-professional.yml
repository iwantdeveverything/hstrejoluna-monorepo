name: QA Professional Gates

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: qa-professional-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: E2E, Accessibility, Lighthouse Gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Next.js Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/apps/portfolio/.next/cache
            ${{ github.workspace }}/apps/maestros-del-salmon/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV
        working-directory: apps/portfolio

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: apps/portfolio

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit
        working-directory: apps/portfolio

      - name: E2E + accessibility gate
        run: npm run qa:e2e --workspace=apps/portfolio

      - name: Lighthouse CI gate
        run: npm run qa:lighthouse --workspace=apps/portfolio

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/portfolio/playwright-report
            apps/portfolio/test-results
          if-no-files-found: ignore

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-ci-report
          path: |
            apps/portfolio/.lighthouseci
          if-no-files-found: ignore
