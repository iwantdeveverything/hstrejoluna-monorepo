name: QA Professional Gates

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      retries:
        description: "Playwright retry count"
        required: false
        default: "2"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  PLAYWRIGHT_RETRIES: ${{ github.event.inputs.retries || '2' }}
  PLAYWRIGHT_INCLUDE_WEBKIT: "1"

concurrency:
  group: qa-professional-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
      lighthouse: ${{ steps.filter.outputs.lighthouse }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'apps/portfolio/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
            lighthouse:
              - 'apps/portfolio/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'

  e2e:
    name: "E2E — ${{ matrix.suite }}"
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.e2e == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        suite:
          - "Desktop Chrome + Memory Leak"
          - "Desktop Firefox + Mobile Chrome"
          - "WebKit + Reduced Motion"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV
        working-directory: apps/portfolio

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: apps/portfolio

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox webkit
        working-directory: apps/portfolio

      # ── E2E: project-based parallelism ──────────────────────────
      # Each matrix suite runs a subset of Playwright projects via
      # --project so tests are never skipped because of wrong browser.
      #
      # Desktop Chrome + Memory Leak: all files via Chrome project,
      # memory-leak runs through its dedicated project (excluded from main
      # Desktop Chrome via testIgnore).
      # Desktop Firefox + Mobile Chrome: Firefox + Pixel 5 emulation
      # WebKit + Reduced Motion: Safari Desktop/Mobile + reduced-motion
      - name: Run E2E — ${{ matrix.suite }}
        run: |
          case "${{ matrix.suite }}" in
            "Desktop Chrome + Memory Leak")
              npx playwright test \
                --project="Desktop Chrome" \
                --project="Desktop Chrome Memory Leak"
              ;;
            "Desktop Firefox + Mobile Chrome")
              npx playwright test --project="Desktop Firefox" --project="Mobile Chrome"
              ;;
            "WebKit + Reduced Motion")
              npx playwright test \
                --project="Desktop Safari" \
                --project="Mobile Safari" \
                --project="Desktop Chrome Reduced Motion"
              ;;
          esac
        working-directory: apps/portfolio

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.suite }}
          path: |
            apps/portfolio/playwright-report
            apps/portfolio/test-results
          if-no-files-found: ignore

  # ── Lighthouse + Bundle ──────────────────────────────────────────
  # Runs in parallel with E2E jobs — each on its own runner.
  # No resource contention with E2E (separate GitHub Actions VMs).
  lighthouse-bundle:
    name: "Lighthouse CI + Bundle Size"
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.lighthouse == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and Dependencies
        uses: ./.github/actions/setup-node-deps

      # Build explicitly so lhci's startServerCommand has a fresh .next.
      # turbo.json's qa:lighthouse dependsOn ["build"] already handles this,
      # but running it here makes failures attributable and surfaces build
      # errors before the Chrome interstitial would mask them.
      - name: Build portfolio
        run: npx turbo run build --filter=portfolio

      - name: Smoke-test next start (sanity check before lhci)
        run: |
          npx next start --port 4174 --hostname 127.0.0.1 &
          SERVER_PID=$!
          for i in {1..30}; do
            if curl -fsS -o /dev/null http://127.0.0.1:4174/en; then
              echo "✓ next start serves /en (HTTP 200)"
              kill $SERVER_PID 2>/dev/null || true
              wait $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "✗ next start did not respond on /en within 30s"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        working-directory: apps/portfolio

      - name: Lighthouse CI gate
        run: npx turbo run qa:lighthouse --filter=portfolio
        env:
          LHCI_DEBUG: "1"

      - name: Bundle-size gate
        run: npx turbo run qa:bundle --filter=portfolio

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-ci-report
          path: |
            apps/portfolio/.lighthouseci
            apps/portfolio/.lhci-debug.log
          if-no-files-found: ignore
