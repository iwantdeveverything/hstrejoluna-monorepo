name: QA Professional Gates

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: qa-professional-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: E2E, Accessibility, Lighthouse Gates
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: apps/portfolio

      - name: Static QA gate (lint + unit/integration)
        run: npm run lint --workspace=apps/portfolio && npm run test --workspace=apps/portfolio

      - name: E2E + accessibility gate
        run: npm run qa:e2e --workspace=apps/portfolio

      - name: Lighthouse CI gate
        run: npm run qa:lighthouse --workspace=apps/portfolio

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/portfolio/playwright-report
            apps/portfolio/test-results
          if-no-files-found: ignore

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-ci-report
          path: |
            apps/portfolio/.lighthouseci
          if-no-files-found: ignore
