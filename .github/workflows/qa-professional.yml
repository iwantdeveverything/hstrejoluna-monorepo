name: QA Professional Gates

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      retries:
        description: "Playwright retry count"
        required: false
        default: "2"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  PLAYWRIGHT_RETRIES: ${{ github.event.inputs.retries || '2' }}
  PLAYWRIGHT_INCLUDE_WEBKIT: "1"

concurrency:
  group: qa-professional-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
      lighthouse: ${{ steps.filter.outputs.lighthouse }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'apps/portfolio/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            lighthouse:
              - 'apps/portfolio/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

  e2e:
    name: "E2E — ${{ matrix.suite }}"
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.e2e == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        suite:
          - "Desktop Chrome"
          - "Mobile Chrome"
          - "WebKit + Reduced Motion"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(pnpm playwright --version | awk '{print $2}')" >> $GITHUB_ENV
        working-directory: apps/portfolio

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      # The GitHub runner ships a packages.microsoft.com apt source that
      # intermittently returns 403 Forbidden, which makes `apt-get update`
      # (run by Playwright's --with-deps / install-deps) fail the whole job
      # before any browser dep is installed. We don't need that repo for
      # Playwright OS deps, so drop it to make apt resilient.
      - name: Neutralize flaky Microsoft apt source
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/microsoft.list \
                     /etc/apt/sources.list.d/azure-cli.list || true
          sudo find /etc/apt/sources.list.d -type f \
            -exec grep -lq 'packages.microsoft.com' {} \; -delete 2>/dev/null || true

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm playwright install --with-deps chromium webkit
        working-directory: apps/portfolio

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm playwright install-deps chromium webkit
        working-directory: apps/portfolio

      # ── E2E: project-based parallelism ──────────────────────────
      # Each matrix suite runs a subset of Playwright projects via
      # --project so tests are never skipped because of wrong browser.
      #
      # Desktop Chrome: all non-reduced-motion files via the Chrome project
      # Mobile Chrome: Pixel 5 emulation
      # WebKit + Reduced Motion: Safari Desktop/Mobile + reduced-motion
      - name: Run E2E — ${{ matrix.suite }}
        run: |
          case "${{ matrix.suite }}" in
            "Desktop Chrome")
              pnpm playwright test --project="Desktop Chrome"
              ;;
            "Mobile Chrome")
              pnpm playwright test --project="Mobile Chrome"
              ;;
            "WebKit + Reduced Motion")
              pnpm playwright test \
                --project="Desktop Safari" \
                --project="Mobile Safari" \
                --project="Desktop Chrome Reduced Motion"
              ;;
          esac
        working-directory: apps/portfolio

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.suite }}
          path: |
            apps/portfolio/playwright-report
            apps/portfolio/test-results
          if-no-files-found: ignore

  # ── Lighthouse + Bundle ──────────────────────────────────────────
  # Runs in parallel with E2E jobs — each on its own runner.
  # No resource contention with E2E (separate GitHub Actions VMs).
  lighthouse-bundle:
    name: "Lighthouse CI + Bundle Size"
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.lighthouse == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and Dependencies
        uses: ./.github/actions/setup-node-deps

      # Build explicitly so lhci's startServerCommand has a fresh .next.
      # turbo.json's qa:lighthouse dependsOn ["build"] already handles this,
      # but running it here makes failures attributable and surfaces build
      # errors before the Chrome interstitial would mask them.
      - name: Build portfolio
        run: pnpm turbo run build --filter=portfolio
        env:
          NEXT_PUBLIC_BASE_URL: "http://127.0.0.1:4173"

      - name: Smoke-test next start (sanity check before lhci)
        run: |
          pnpm next start --port 4174 --hostname 127.0.0.1 &
          SERVER_PID=$!
          for i in {1..30}; do
            if curl -fsS -o /dev/null http://127.0.0.1:4174/en; then
              echo "✓ next start serves /en (HTTP 200)"
              kill $SERVER_PID 2>/dev/null || true
              wait $SERVER_PID 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done
          echo "✗ next start did not respond on /en within 30s"
          kill $SERVER_PID 2>/dev/null || true
          exit 1
        working-directory: apps/portfolio

      - name: Lighthouse CI gate
        run: pnpm turbo run qa:lighthouse --filter=portfolio
        env:
          LHCI_DEBUG: "1"
          # Pin metadataBase to the lhci origin so canonical URLs resolve to
          # the same host Lighthouse is actually testing. Without this, Next
          # uses the production NEXT_PUBLIC_BASE_URL fallback and Lighthouse
          # SEO audit fails canonical: "Points to another hreflang location".
          NEXT_PUBLIC_BASE_URL: "http://127.0.0.1:4173"

      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-ci-report
          path: |
            apps/portfolio/.lighthouseci
            apps/portfolio/.lhci-debug.log
          if-no-files-found: ignore
