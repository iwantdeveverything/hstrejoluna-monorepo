name: CI

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Build, Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Storybook scope changes
        id: storybook_changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            storybook:
              - 'apps/portfolio/.storybook/**'
              - 'apps/portfolio/components/**/*.tsx'
              - 'apps/portfolio/scripts/**'
              - 'apps/portfolio/test/**'
              - 'apps/portfolio/app/globals.css'
              - 'apps/portfolio/package.json'
              - 'packages/ui/**'
              - 'package.json'
              - 'turbo.json'

      - name: Simulate required check failure (act only)
        if: ${{ env.ACT == 'true' && env.ACT_FAIL_REQUIRED_CHECK == 'true' }}
        run: |
          echo "Forcing CI failure in local act run."
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Next.js Cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/apps/portfolio/.next/cache
            ${{ github.workspace }}/apps/maestros-del-salmon/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test portfolio workspace
        run: npm run test --workspace=apps/portfolio

      - name: Storybook static build (portfolio)
        if: ${{ github.event_name == 'workflow_dispatch' || steps.storybook_changes.outputs.storybook == 'true' }}
        run: npm run storybook:build --workspace=apps/portfolio

      - name: Storybook failure contract (portfolio)
        if: ${{ github.event_name == 'workflow_dispatch' || steps.storybook_changes.outputs.storybook == 'true' }}
        run: npm run storybook:build:expect-fail --workspace=apps/portfolio
