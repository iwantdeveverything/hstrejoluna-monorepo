name: CI

on:
  pull_request:
    branches:
      - master
      - "feat/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck, Build, Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Detect Storybook scope changes
        id: storybook_changes
        uses: dorny/paths-filter@v3
        continue-on-error: ${{ env.ACT == 'true' }}
        with:
          filters: |
            storybook:
              - 'apps/portfolio/.storybook/**'
              - 'apps/portfolio/components/**/*.tsx'
              - 'apps/portfolio/scripts/**'
              - 'apps/portfolio/test/**'
              - 'apps/portfolio/app/globals.css'
              - 'apps/portfolio/package.json'
              - 'packages/ui/**'
              - 'package.json'
              - 'turbo.json'

      - name: Simulate required check failure (act only)
        if: ${{ env.ACT == 'true' && env.ACT_FAIL_REQUIRED_CHECK == 'true' }}
        run: |
          echo "Forcing CI failure in local act run."
          exit 1

      - name: Lint
        run: pnpm turbo run lint --filter=portfolio --filter=maestros-del-salmon

      - name: Typecheck
        run: pnpm turbo run typecheck --filter=portfolio --filter=maestros-del-salmon

      - name: Build
        run: pnpm turbo run build --filter=portfolio --filter=maestros-del-salmon

      - name: Test portfolio workspace
        run: pnpm turbo run test --filter=portfolio

      - name: Storybook static build (portfolio)
        if: ${{ github.event_name == 'workflow_dispatch' || steps.storybook_changes.outputs.storybook == 'true' || env.ACT == 'true' }}
        run: pnpm --filter portfolio storybook:build

      - name: Storybook failure contract (portfolio)
        if: ${{ github.event_name == 'workflow_dispatch' || steps.storybook_changes.outputs.storybook == 'true' || env.ACT == 'true' }}
        run: pnpm --filter portfolio storybook:build:expect-fail
