name: Feature Request
description: Propose a new feature or improvement.
labels: ["enhancement", "status:needs-review"]
body:
  - type: checkboxes
    id: pre-flight
    attributes:
      label: Pre-flight Checks
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I understand this issue needs status:approved before a PR can be opened
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What pain point does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work from the user's perspective?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Apps (Portfolio/Studio)
        - Infrastructure (Monorepo/Turbo)
        - CMS (Sanity)
        - Scripts
        - Documentation
        - CI/Workflows
        - Other
    validations:
      required: true
  - type: dropdown
    id: semver-impact
    attributes:
      label: Expected SemVer Impact
      description: Initial triage estimate; final value is selected in PR.
      options:
        - patch (bug fix / backward-compatible correction)
        - minor (new backward-compatible capability)
        - major (breaking behavior/API change)
        - none (docs/chore/no runtime impact)
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches or workarounds.
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Mockups, examples, or references.
