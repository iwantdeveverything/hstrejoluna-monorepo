name: Bug Report
description: Report a bug to help us improve.
labels: ["bug", "status:needs-review"]
body:
  - type: checkboxes
    id: pre-flight
    attributes:
      label: Pre-flight Checks
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: I understand this issue needs status:approved before a PR can be opened
          required: true
  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: Clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Numbered steps to reproduce the issue.
      placeholder: |
        1. Clone the repo
        2. Run ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened (include errors/logs).
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Arch/Fedora)
        - Windows
        - WSL
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Agent / Client
      options:
        - Claude Code
        - Gemini CLI
        - OpenCode
        - Cursor
        - Windsurf
        - Other
    validations:
      required: true
  - type: dropdown
    id: shell
    attributes:
      label: Shell
      options:
        - bash
        - zsh
        - fish
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Please include relevant logs here.
      render: shell
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, workarounds, or extra info.
