# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: TypeScript, React 19, Next.js 16 (App Router), Sanity Studio, Turborepo.
  Architecture: Monorepo with NPM workspaces. Portfolio and Landing apps connected to Sanity CMS.
  Testing: Vitest (unit) + Testing Library (integration) + Playwright (e2e).
  Style: Clean Code, Type Safety (no any), DRY, KISS. camelCase (vars/fns), PascalCase (components).

strict_tdd: true

testing:
  runner:
    name: vitest
    command: npm test
  layers:
    unit:
      available: true
      tool: vitest
      command: npm test
    integration:
      available: true
      tool: "@testing-library/react"
      command: npm test
    e2e:
      available: true
      tool: playwright
      command: npm run qa:e2e --workspace=apps/portfolio
  coverage:
    available: false
    command: "—"
  quality_tools:
    linter:
      available: true
      command: npm run lint
    type_checker:
      available: true
      command: npm run typecheck
    formatter:
      available: true
      command: npm run format

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions (AGENTS.md)
    - Load relevant coding skills for the project stack (Next.js, React, Sanity)
  verify:
    - Run tests if test infrastructure exists.
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
